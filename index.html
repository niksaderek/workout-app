<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Track your workouts, monitor progress, and achieve your fitness goals">
  <title>Workout Pro</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Workout Pro">

  <!-- Minimal Tailwind CSS (23KB vs 3.5MB CDN) -->
  <link rel="stylesheet" href="/styles.css">

  <!-- Preload critical resources for faster loading -->
  <link rel="preload" href="https://unpkg.com/react@18/umd/react.production.min.js" as="script" crossorigin>
  <link rel="preload" href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" as="script" crossorigin>
  <link rel="preload" href="/app.js" as="script">

  <!-- Defer scripts to not block HTML parsing - loading skeleton shows immediately -->
  <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overscroll-behavior-y: contain; }
    *::-webkit-scrollbar { width: 0; background: transparent; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    /* Mobile scrolling performance optimizations */
    .transform-gpu {
      transform: translateZ(0);
      will-change: transform;
      -webkit-transform: translateZ(0);
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    /* Smooth scrolling - removed transform to fix fixed positioning */
    #root {
      -webkit-overflow-scrolling: touch;
    }

    /* Fixed bottom navigation - ensure it stays fixed on mobile */
    .fixed-bottom-nav {
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 9998 !important;
    }

    /* Loading skeleton styles */
    .loading-skeleton {
      background: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #9CA3AF;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #374151;
      border-top-color: #6B7280;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- Loading skeleton - removed by React when app mounts -->
    <div class="loading-skeleton">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading Workout Pro...</div>
    </div>
  </div>
  <script defer src="/app.js"></script>
</body>
</html>
